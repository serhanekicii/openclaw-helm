name: Bump OpenClaw Version

on:
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      version:
        description: "OpenClaw image tag (e.g., 2026.1.30-1). Leave empty to auto-detect from GHCR."
        required: false
        type: string
      chromium_version:
        description: "Chromium image tag (e.g., 146.0.7680.31). Leave empty to auto-detect latest stable."
        required: false
        type: string
      chart_bump:
        description: "Chart version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Dry run (show changes without committing)"
        required: false
        type: boolean
        default: false

concurrency: chart_releaser

jobs:
  bump:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get latest OpenClaw version
        id: get-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            # Resolve the actual image tag from GHCR by finding which version
            # tag shares the same digest as 'latest'. GitHub releases may not
            # match published image tags (e.g., release 2026.3.13 exists but
            # the image is tagged 2026.3.13-1).
            latest_digest=$(gh api \
              /orgs/openclaw/packages/container/openclaw/versions \
              --paginate --jq '.[] | select(.metadata.container.tags | index("latest")) | .name')

            if [ -z "$latest_digest" ]; then
              echo "::error::Could not resolve 'latest' image digest from GHCR"
              exit 1
            fi
            echo "Latest image digest: $latest_digest"

            # Find the version tag (YYYY.M.D or YYYY.M.D-N format) on the same digest
            version=$(gh api \
              /orgs/openclaw/packages/container/openclaw/versions \
              --paginate \
              | jq -r --arg d "$latest_digest" \
              '.[] | select(.name == $d) | .metadata.container.tags[] | select(test("^[0-9]{4}\\.[0-9]{1,2}\\.[0-9]{1,2}(-[0-9]+)?$"))' \
              | head -1)

            if [ -z "$version" ]; then
              echo "::error::Could not find a version tag for the 'latest' image digest"
              exit 1
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "OpenClaw version: $version"

      - name: Get current versions
        id: current
        run: |
          chart_version=$(grep '^version:' charts/openclaw/Chart.yaml | awk '{print $2}')
          app_version=$(grep '^appVersion:' charts/openclaw/Chart.yaml | awk '{print $2}' | tr -d '"')
          chromium_version=$(grep 'chromiumVersion:' charts/openclaw/values.yaml | awk '{print $2}' | tr -d '"')
          echo "chart_version=$chart_version" >> "$GITHUB_OUTPUT"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "chromium_version=$chromium_version" >> "$GITHUB_OUTPUT"
          echo "Current chart version: $chart_version"
          echo "Current app version: $app_version"
          echo "Current chromium version: $chromium_version"

      - name: Get latest Chromium version
        id: get-chromium
        run: |
          if [ -n "${{ inputs.chromium_version }}" ]; then
            version="${{ inputs.chromium_version }}"
          else
            echo "Auto-detecting latest stable chromedp/headless-shell version..."
            stable_digest=$(curl -s "https://hub.docker.com/v2/repositories/chromedp/headless-shell/tags/?page_size=1&name=stable" \
              | jq -r '.results[0].digest')
            if [ -z "$stable_digest" ] || [ "$stable_digest" = "null" ]; then
              echo "::warning::Could not fetch stable digest, skipping chromium update"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            version=$(curl -s "https://hub.docker.com/v2/repositories/chromedp/headless-shell/tags/?page_size=50&ordering=last_updated" \
              | jq -r --arg d "$stable_digest" \
                '[.results[] | select(.digest==$d) | .name | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$"))][0]')
            if [ -z "$version" ] || [ "$version" = "null" ]; then
              echo "::warning::Could not resolve stable digest to a version tag, skipping chromium update"
              echo "version=" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Chromium version: $version"

      - name: Check if update needed
        id: check
        run: |
          skip=true
          openclaw_changed=false
          chromium_changed=false
          if [ "${{ steps.get-version.outputs.version }}" != "${{ steps.current.outputs.app_version }}" ]; then
            skip=false
            openclaw_changed=true
            echo "OpenClaw version changed"
          fi
          if [ -n "${{ steps.get-chromium.outputs.version }}" ] && [ "${{ steps.get-chromium.outputs.version }}" != "${{ steps.current.outputs.chromium_version }}" ]; then
            skip=false
            chromium_changed=true
            echo "Chromium version changed"
          fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "openclaw_changed=$openclaw_changed" >> "$GITHUB_OUTPUT"
          echo "chromium_changed=$chromium_changed" >> "$GITHUB_OUTPUT"
          if [ "$skip" = "true" ]; then
            echo "Already on latest versions, skipping."
          fi

      - name: Calculate new chart version
        if: steps.check.outputs.skip != 'true'
        id: new-version
        run: |
          current="${{ steps.current.outputs.chart_version }}"
          IFS='.' read -r major minor patch <<< "$current"

          # Use input or default to patch for scheduled runs
          bump_type="${{ inputs.chart_bump }}"
          bump_type="${bump_type:-patch}"

          case "$bump_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "New chart version: $new_version"

      - name: Install yq
        if: steps.check.outputs.skip != 'true'
        uses: mikefarah/yq@v4

      - name: Update Chart.yaml version
        if: steps.check.outputs.skip != 'true'
        run: |
          yq -i '.version = "${{ steps.new-version.outputs.new_version }}"' charts/openclaw/Chart.yaml
          if [ "${{ steps.check.outputs.openclaw_changed }}" = "true" ]; then
            yq -i '.appVersion = "${{ steps.get-version.outputs.version }}"' charts/openclaw/Chart.yaml
          fi

      - name: Update OpenClaw version in values.yaml
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.openclaw_changed == 'true'
        run: |
          version="${{ steps.get-version.outputs.version }}"
          old_version="${{ steps.current.outputs.app_version }}"
          # Update the single openclawVersion value (all containers reference it via tpl)
          sed -i "s/openclawVersion: \"${old_version}\"/openclawVersion: \"${version}\"/" charts/openclaw/values.yaml

      - name: Update ArtifactHub image annotations
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.openclaw_changed == 'true'
        run: |
          version="${{ steps.get-version.outputs.version }}"
          old_version="${{ steps.current.outputs.app_version }}"
          sed -i "s|ghcr.io/openclaw/openclaw:${old_version}|ghcr.io/openclaw/openclaw:${version}|g" charts/openclaw/Chart.yaml

      - name: Update chromium version
        if: steps.check.outputs.skip != 'true' && steps.check.outputs.chromium_changed == 'true'
        run: |
          new_chromium="${{ steps.get-chromium.outputs.version }}"
          old_chromium="${{ steps.current.outputs.chromium_version }}"
          sed -i "s/chromiumVersion: \"${old_chromium}\"/chromiumVersion: \"${new_chromium}\"/" charts/openclaw/values.yaml
          sed -i "s|chromedp/headless-shell:${old_chromium}|chromedp/headless-shell:${new_chromium}|g" charts/openclaw/Chart.yaml
          echo "Updated chromium: ${old_chromium} -> ${new_chromium}"

      - name: Update ArtifactHub changelog
        if: steps.check.outputs.skip != 'true'
        run: |
          changelog=""
          if [ "${{ steps.check.outputs.openclaw_changed }}" = "true" ]; then
            changelog="${changelog}- kind: changed\n  description: \"Bump OpenClaw to ${{ steps.get-version.outputs.version }}\"\n"
          fi
          if [ "${{ steps.check.outputs.chromium_changed }}" = "true" ]; then
            changelog="${changelog}- kind: changed\n  description: \"Bump Chromium to ${{ steps.get-chromium.outputs.version }}\"\n"
          fi
          if [ -n "$changelog" ]; then
            printf "%b" "$changelog" > /tmp/changelog.yaml
            yq -i '.annotations["artifacthub.io/changes"] = load_str("/tmp/changelog.yaml")' charts/openclaw/Chart.yaml
          fi

      - name: Install helm-docs
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/helm-docs
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz -C /tmp/helm-docs
          sudo mv /tmp/helm-docs/helm-docs /usr/local/bin/

      - name: Regenerate docs
        if: steps.check.outputs.skip != 'true'
        run: |
          helm-docs --chart-search-root=charts

      - name: Generate values schema
        if: steps.check.outputs.skip != 'true'
        uses: losisin/helm-values-schema-json-action@v2
        with:
          values: charts/openclaw/values.yaml
          output: charts/openclaw/values.schema.json
          draft: 2020
          indent: 4
          useHelmDocs: true
          title: OpenClaw Helm Chart Values
          description: "Configuration values for the OpenClaw Helm chart. OpenClaw is a single-instance AI assistant — do NOT increase replica count."

      - name: Show changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git diff

      - name: Commit and push
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/openclaw/Chart.yaml charts/openclaw/values.yaml charts/openclaw/README.md charts/openclaw/values.schema.json
          parts=""
          if [ "${{ steps.check.outputs.openclaw_changed }}" = "true" ]; then
            parts="openclaw to ${{ steps.get-version.outputs.version }}"
          fi
          if [ "${{ steps.check.outputs.chromium_changed }}" = "true" ]; then
            if [ -n "$parts" ]; then
              parts="$parts, chromium to ${{ steps.get-chromium.outputs.version }}"
            else
              parts="chromium to ${{ steps.get-chromium.outputs.version }}"
            fi
          fi
          git commit -m "chore: bump $parts"
          git push

      - name: Set up Helm
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        uses: azure/setup-helm@v5
        with:
          version: v3.17.2

      - name: Add dependency chart repos
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          helm repo add bjw-s-labs https://bjw-s-labs.github.io/helm-charts/

      - name: Prepare GPG keyring
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          mkdir -p .cr-gpg
          base64 -d <<< "$GPG_KEYRING_BASE64" > .cr-gpg/secring.gpg
        env:
          GPG_KEYRING_BASE64: "${{ secrets.GPG_KEYRING_BASE64 }}"

      - name: Run chart-releaser
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: true
          CR_SKIP_EXISTING: true
          CR_SIGN: true
          CR_KEY: "openclaw-helm chart signing"
          CR_KEYRING: .cr-gpg/secring.gpg

      - name: Login to GitHub Container Registry
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Charts to GHCR
        if: steps.check.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          for pkg in .cr-release-packages/*.tgz; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            helm push "${pkg}" oci://ghcr.io/${{ github.repository }}
          done

      - name: Dry run summary
        if: steps.check.outputs.skip != 'true' && inputs.dry_run == true
        run: |
          echo "::notice::Dry run - no changes committed"
          echo "Would bump OpenClaw to ${{ steps.get-version.outputs.version }}"
          echo "Would bump chart version to ${{ steps.new-version.outputs.new_version }}"
          if [ "${{ steps.check.outputs.chromium_changed }}" = "true" ]; then
            echo "Would bump chromium to ${{ steps.get-chromium.outputs.version }}"
          fi
