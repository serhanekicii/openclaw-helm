name: Generate Docs

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/docs.yaml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  helm-docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install helm-docs
        run: |
          mkdir -p /tmp/helm-docs
          curl -sSL https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz -C /tmp/helm-docs
          sudo mv /tmp/helm-docs/helm-docs /usr/local/bin/

      - name: Run helm-docs
        run: |
          helm-docs --chart-search-root=charts

      - name: Generate values schema
        uses: losisin/helm-values-schema-json-action@v2
        with:
          values: charts/openclaw/values.yaml
          output: charts/openclaw/values.schema.json
          draft: 2020
          indent: 4
          useHelmDocs: true
          title: OpenClaw Helm Chart Values
          description: "Configuration values for the OpenClaw Helm chart. OpenClaw is a single-instance AI assistant — do NOT increase replica count."

      - name: Commit updated docs
        run: |
          if ! git diff --quiet charts/openclaw/README.md charts/openclaw/values.schema.json; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "::error::Docs are out of date. Please run 'helm-docs --chart-search-root=charts' and regenerate values.schema.json locally, then commit the result."
              exit 1
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add charts/openclaw/README.md charts/openclaw/values.schema.json
            git commit -m "chore: regenerate docs and values schema"
            git push origin HEAD:${{ github.head_ref }}
          fi
