apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: openclaw
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: openclaw
    helm.sh/chart: app-template-4.6.2
  namespace: default
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/name: openclaw
      app.kubernetes.io/instance: openclaw
  template:
    metadata:
      annotations:
        checksum/configMaps: d16ed3f007089c9b430a7bb2625a0fdb11ebc19f5fb8851a1c837f21deaa47e9
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: openclaw
        app.kubernetes.io/name: openclaw
    spec:
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      initContainers:
        - command:
            - sh
            - /scripts/init-config.sh
          env:
            - name: CONFIG_MODE
              value: merge
          image: ghcr.io/openclaw/openclaw:APP_VERSION
          name: init-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /config
              name: config
              readOnly: true
            - mountPath: /home/node/.openclaw
              name: data
            - mountPath: /scripts
              name: scripts
              readOnly: true
            - mountPath: /tmp
              name: tmp
        - command:
            - sh
            - /scripts/init-homebrew.sh
          env:
            - name: HOME
              value: /tmp
            - name: HOMEBREW_ENABLED
              value: "false"
            - name: HOMEBREW_PACKAGES
              value: ""
          image: ghcr.io/openclaw/openclaw:APP_VERSION
          name: init-homebrew
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: data
            - mountPath: /scripts
              name: scripts
              readOnly: true
            - mountPath: /tmp
              name: tmp
        - command:
            - sh
            - /scripts/init-skills.sh
          env:
            - name: HOME
              value: /tmp
            - name: NPM_CONFIG_CACHE
              value: /tmp/.npm
            - name: SKILLS_TO_INSTALL
              value: weather gog
          image: ghcr.io/openclaw/openclaw:APP_VERSION
          name: init-skills
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          volumeMounts:
            - mountPath: /home/node/.openclaw
              name: data
            - mountPath: /scripts
              name: scripts
              readOnly: true
            - mountPath: /tmp
              name: tmp
      containers:
        - env:
            - name: XDG_CACHE_HOME
              value: /tmp
          image: chromedp/headless-shell:147.0.7727.56
          livenessProbe:
            failureThreshold: 6
            httpGet:
              path: /json/version
              port: 9222
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          name: chromium
          readinessProbe:
            httpGet:
              path: /json/version
              port: 9222
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          startupProbe:
            failureThreshold: 12
            httpGet:
              path: /json/version
              port: 9222
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /tmp
              name: tmp
        - args:
            - gateway
            - --bind
            - lan
            - --port
            - "18789"
          command:
            - node
            - dist/index.js
          image: ghcr.io/openclaw/openclaw:APP_VERSION
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 30
            tcpSocket:
              port: 18789
            timeoutSeconds: 5
          name: main
          readinessProbe:
            failureThreshold: 3
            initialDelaySeconds: 10
            periodSeconds: 10
            tcpSocket:
              port: 18789
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
          startupProbe:
            failureThreshold: 30
            initialDelaySeconds: 5
            periodSeconds: 5
            tcpSocket:
              port: 18789
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /home/node/.bash_aliases
              name: bash-aliases
              readOnly: true
              subPath: bash_aliases
            - mountPath: /home/node/.openclaw
              name: data
            - mountPath: /tmp
              name: tmp
      volumes:
        - configMap:
            name: openclaw-config
          name: bash-aliases
        - configMap:
            name: openclaw-config
          name: config
        - name: data
          persistentVolumeClaim:
            claimName: openclaw
        - configMap:
            name: openclaw-scripts
          name: scripts
        - emptyDir: {}
          name: tmp
kind: PersistentVolumeClaim
